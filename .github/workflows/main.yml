name: Ejecutar MASTER-HUMAN Bot Diario

on:
  schedule:
    # Se ejecuta todos los días a las 03:00 AM UTC (Aprox 00:00 en Argentina)
    - cron: '0 3 * * *'
  workflow_dispatch: # Esto te permite ejecutarlo manualmente con un botón

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar el código
      uses: actions/checkout@v3
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Instalar librerías
      run: |
        pip install pytrends yfinance pandas
        
    - name: Ejecutar el Robot (extractor.py)
      run: python extractor.py
      
    - name: Guardar los nuevos datos en GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add historial_svix.csv
        git commit -m "Actualizacion diaria de S-VIX" || echo "No hay cambios para subir"
        git push
